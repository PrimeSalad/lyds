name: CI

on:
  pull_request:
  push:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm run install:all
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm run install:all
      - run: npm run type-check

  e2e:
    name: Tests and builds
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json
      - run: npm run install:all
      - run: npm test
      - run: npm run build

  ci-ok:
    name: CI OK
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, typecheck, e2e]
    steps:
      - name: Require lint, typecheck, and E2E to succeed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          E2E_RESULT: ${{ needs.e2e.result }}
        run: |
          if [[ "$LINT_RESULT" != "success" || "$TYPECHECK_RESULT" != "success" || "$E2E_RESULT" != "success" ]]; then
            echo "lint=$LINT_RESULT typecheck=$TYPECHECK_RESULT e2e=$E2E_RESULT"
            exit 1
          fi
